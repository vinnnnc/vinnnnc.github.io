        <script>
            (function () {
                var stored = localStorage.getItem("theme");
                var theme = stored === "light" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.style.background = theme === "dark" ? "#0a0a0a" : "#f9f9f9";
            })();
        </script>
